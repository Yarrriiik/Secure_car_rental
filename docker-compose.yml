services:
  db:
    image: postgres:16-alpine
    container_name: secure_car_rental_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-car_rental_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-local_demo_password}
      POSTGRES_DB: ${DB_NAME:-secure_car_rental}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-car_rental_user} -d ${DB_NAME:-secure_car_rental}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-secure_car_rental}
      DB_USER: ${DB_USER:-car_rental_user}
      DB_PASSWORD: ${DB_PASSWORD:-local_demo_password}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-0}
    ports:
      - "${FLASK_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
