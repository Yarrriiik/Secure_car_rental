version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: secure_car_rental_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-car_rental_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-car_rental_password}
      POSTGRES_DB: ${DB_NAME:-secure_car_rental}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-car_rental_user} -d ${DB_NAME:-secure_car_rental}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
