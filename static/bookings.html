<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Бронирования - Secure Car Rental</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="page">
  <div class="card list-page">
    <h1>Заявки на бронирование</h1>
    <p id="user-info"></p>

    <button id="back-cars">К автомобилям</button>
    <button id="logout-btn" type="button">Выйти</button>

    <p id="error" style="color:red; margin-top:8px;"></p>

    <table id="bookings-table" style="width:100%; border-collapse:collapse; margin-top:12px; font-size:14px;">
      <thead>
      <tr>
        <th style="text-align:left;">ID</th>
        <th style="text-align:left;">Пользователь</th>
        <th style="text-align:left;">Авто</th>
        <th style="text-align:left;">Период</th>
        <th style="text-align:left;">Статус</th>
        <th style="text-align:left;">Действия</th>
      </tr>
      </thead>
      <tbody id="bookings-body">
      </tbody>
    </table>
  </div>
</div>

<script>
  const userInfo = document.getElementById('user-info');
  const errorEl = document.getElementById('error');
  const backCarsBtn = document.getElementById('back-cars');
  const logoutBtn = document.getElementById('logout-btn');
  const bookingsBody = document.getElementById('bookings-body');

  const STATUSES = ["PENDING", "APPROVED", "CANCELLED", "FINISHED"];

  async function loadMe() {
    const resp = await fetch('/api/me', {credentials: 'same-origin'});
    if (!resp.ok) {
      window.location.href = '/login.html';
      return null;
    }
    const data = await resp.json();
    userInfo.textContent = `Вы вошли как ${data.username}`;
    return data;
  }

  async function loadBookings() {
    errorEl.textContent = '';
    bookingsBody.innerHTML = '';

    const resp = await fetch('/bookings', {credentials: 'same-origin'});
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      // если обычный пользователь зайдёт на страницу, тут будет 403 forbidden
      errorEl.textContent = data.error || 'Ошибка загрузки заявок (недостаточно прав?)';
      return;
    }

    const bookings = await resp.json();

    for (const b of bookings) {
      const tr = document.createElement('tr');

      const period = `${b.start_date} — ${b.end_date}`;

      const tdId = document.createElement('td');
      tdId.textContent = b.id;

      const tdUser = document.createElement('td');
      tdUser.textContent = b.username;

      const tdCar = document.createElement('td');
      tdCar.textContent = `${b.model} (${b.plate_number})`;

      const tdPeriod = document.createElement('td');
      tdPeriod.textContent = period;

      const tdStatus = document.createElement('td');
      const select = document.createElement('select');
      for (const s of STATUSES) {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        if (s === b.status) opt.selected = true;
        select.appendChild(opt);
      }
      tdStatus.appendChild(select);

      const tdActions = document.createElement('td');
      const btn = document.createElement('button');
      btn.textContent = 'Сохранить';
      btn.addEventListener('click', async () => {
        const newStatus = select.value;
        const resp = await fetch(`/bookings/${b.id}/status`, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          credentials: 'same-origin',
          body: JSON.stringify({status: newStatus})
        });

        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          alert(data.error || 'Ошибка обновления статуса');
        } else {
          await loadBookings();
        }
      });
      tdActions.appendChild(btn);

      tr.appendChild(tdId);
      tr.appendChild(tdUser);
      tr.appendChild(tdCar);
      tr.appendChild(tdPeriod);
      tr.appendChild(tdStatus);
      tr.appendChild(tdActions);

      bookingsBody.appendChild(tr);
    }
  }

  backCarsBtn.addEventListener('click', () => {
    window.location.href = '/cars.html';
  });

  logoutBtn.addEventListener('click', async () => {
    await fetch('/api/logout', {
      method: 'POST',
      credentials: 'same-origin'
    });
    window.location.href = '/login.html';
  });

  loadMe().then(loadBookings);
</script>
</body>
</html>
